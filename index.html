<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Map System v1.3 LUX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00e5ff; 
            --danger-color: #ff3366; 
            --info-color: #a277ff; 
            --bg-dark: #050505;
            --panel-bg: rgba(10, 12, 16, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.2);
            --input-bg: rgba(0, 0, 0, 0.5);
            --text-main: #f0f4f8;
            --text-muted: #718096;
            --font-main: 'Inter', sans-serif;
            --font-tech: 'JetBrains Mono', monospace;
        }
        
        body, html, #map, .leaflet-container, * { cursor: crosshair !important; }
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: var(--font-main); color: var(--text-main); overflow: hidden; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }

        /* --- YENİ: YANIP SÖNME EFEKTİ (PULSE) --- */
        @keyframes markerPulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            100% { transform: scale(2); opacity: 0; box-shadow: 0 0 0 40px rgba(0, 229, 255, 0); }
        }
        .pulse-active .icon-box::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid var(--primary-color); animation: markerPulse 1.2s ease-out; pointer-events: none;
        }

        /* --- MODERN SOL ÜST ÜNLEM --- */
        .info-panel { position: fixed; top: 20px; left: 130px; z-index: 1001; }
        .info-btn { 
            width: 38px; height: 38px; background: var(--panel-bg); border: 1px solid var(--border-color); 
            border-radius: 12px; color: var(--primary-color); display: flex; align-items: center; 
            justify-content: center; font-family: var(--font-tech); font-weight: 900; cursor: pointer !important;
            backdrop-filter: blur(20px); transition: 0.3s;
        }
        .info-btn:hover { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(0,229,255,0.2); }
        .info-content {
            position: absolute; top: 50px; left: 0; width: 260px; background: var(--panel-bg); 
            border: 1px solid var(--border-color); padding: 18px; border-radius: 16px; 
            font-size: 11px; color: var(--text-main); opacity: 0; pointer-events: none; 
            transition: 0.3s; backdrop-filter: blur(40px); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .info-panel:hover .info-content { opacity: 1; pointer-events: all; }

        /* --- SENİN ORİJİNAL TASARIMIN --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a0e14 0%, #030405 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: var(--panel-bg); padding: 50px 40px; border-radius: 24px; border: 1px solid var(--border-color); text-align: center; width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.9); backdrop-filter: blur(40px); }
        .login-box h2 { color: #fff; letter-spacing: 4px; margin-bottom: 30px; font-size: 18px; font-weight: 800; font-family: var(--font-tech); }
        .login-box input { padding: 16px; width: 100%; border-radius: 12px; border: 1px solid var(--border-highlight); background: var(--input-bg); color: white; margin-bottom: 20px; text-align: center; font-family: var(--font-tech); }
        .login-box button { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--primary-color); border-radius: 12px; color: var(--primary-color); cursor: pointer !important; font-family: var(--font-tech); font-weight: 800; }
        
        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); z-index: 1; }

        .top-controls { position: fixed; top: 20px; left: 20px; z-index: 1001; display: flex; gap: 12px; }
        #main-logo { font-weight: 900; font-size: 13px; color: #fff; background: var(--panel-bg); padding: 12px 22px; border-radius: 12px; border: 1px solid var(--border-color); transition: 0.3s; cursor: pointer !important; backdrop-filter: blur(20px); font-family: var(--font-tech); }
        #main-logo:hover { border-color: var(--primary-color); color: var(--primary-color); }

        #gta-checklist { position: fixed; top: 20px; right: 20px; z-index: 1001; display: flex; flex-direction: column; gap: 5px; max-height: 90vh; width: 340px; transition: 0.5s cubic-bezier(0.25, 1, 0.5, 1); transform: translateX(110%); }
        #gta-checklist.active { transform: translateX(0); }
        #checklist-toggle { position: fixed; top: 20px; right: 20px; z-index: 1002; background: var(--panel-bg); color: var(--primary-color); border: 1px solid var(--border-color); padding: 12px 20px; border-radius: 12px; font-family: var(--font-tech); font-weight: 900; cursor: pointer !important; backdrop-filter: blur(20px); }

        .checklist-inner { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; overflow-y: auto; backdrop-filter: blur(40px); margin-top: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .gta-list-item { background: var(--input-bg); padding: 12px 16px; margin-bottom: 8px; border-radius: 10px; font-family: var(--font-tech); text-transform: uppercase; border: 1px solid var(--border-color); border-left: 3px solid var(--primary-color); cursor: grab !important; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .gta-list-item:hover { border-color: var(--primary-color); background: rgba(255,255,255,0.02); }
        .gta-list-item.dragging { opacity: 0.4; }
        
        #controls { position: fixed; top: 85px; left: 20px; z-index: 1000; background: var(--panel-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border-color); width: 300px; backdrop-filter: blur(40px); max-height: 85vh; overflow-y: auto; transition: 0.5s; }
        #controls.collapsed { transform: translateX(-350px); opacity: 0; }
        
        .pixel-marker { display: flex; align-items: center; justify-content: center; }
        .icon-box { width: 100%; height: 100%; border-radius: 50%; background-size: cover !important; position: relative; }
        .marker-label { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: rgba(5, 5, 5, 0.9); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 700; font-family: var(--font-tech); white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
        
        .fill-red { border: 2px solid var(--danger-color); background: rgba(255, 51, 102, 0.4) !important; }
        .fill-green { border: 2px solid var(--primary-color); background: rgba(0, 229, 255, 0.3) !important; }
        .hollow-black { border: 2px solid #fff; background: rgba(0,0,0,0.6) !important; }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: var(--border-highlight); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { height: 14px; width: 14px; border-radius: 50%; background: var(--primary-color); -webkit-appearance: none; margin-top: -5px; box-shadow: 0 0 10px var(--primary-color); }
        select, input[type="text"], input[type="file"] { width: 100%; background: var(--input-bg); color: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; font-size: 12px; font-family: var(--font-tech); margin-bottom: 10px; outline: none; }
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--input-bg); color: #fff; font-family: var(--font-tech); font-weight: 700; text-transform: uppercase; font-size: 10px; cursor: pointer !important; margin-bottom: 8px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="login-overlay">
    <div class="login-box">
        <h2>YYIIDO NIEVES MAPS</h2>
        <input type="password" id="passInput" placeholder="SİSTEM ŞİFRESİ">
        <button onclick="checkLogin()">GİRİŞ YAP</button>
    </div>
</div>

<div id="main-content">
    <div class="top-controls">
        <div id="main-logo" onclick="togglePanel()">KNGLRP</div>
        
        <div class="info-panel">
            <div class="info-btn">!</div>
            <div class="info-content">
                <span style="color:var(--primary-color); font-weight:800; letter-spacing:1px;">SİSTEM REHBERİ</span><br><br>
                • <b>HIZLI ERİŞİM:</b> Sağdaki listede bir veriye tıkladığınızda harita oraya odaklanır ve yanıp söner.<br><br>
                • <b>SÜREKLİ KAYIT:</b> Tüm işaretçiler ve sıralamalar tarayıcınıza otomatik kaydedilir.
            </div>
        </div>
    </div>

    <button id="checklist-toggle" onclick="toggleChecklist()">[ &gt; ]</button>

    <div id="gta-checklist">
        <div class="checklist-inner">
            <div class="checklist-header" style="font-family:var(--font-tech); font-size:11px; margin-bottom:15px; opacity:0.6;">LOKASYON VERİTABANI</div>
            <div id="checklist-items"></div>
        </div>
    </div>

    <div id="controls">
        <div class="panel-header" style="font-family:var(--font-tech); font-size:11px; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:10px;">KONTROL PANELİ</div>
        <input type="file" id="mainMapInput" accept="image/*">
        <input type="text" id="markerTextInput" placeholder="Etiket">
        <select id="typeSelect">
            <option value="green">🟢 GÜVENLİ</option>
            <option value="red">🔴 RİSKLİ</option>
            <option value="black">⚫ STANDART</option>
            <option value="custom_img">🖼️ ÖZEL İKON</option>
        </select>
        <input type="file" id="markerImgInput" accept="image/*">
        <input type="range" id="sizeSlider" min="15" max="150" value="40">
        <button class="btn-action" onclick="exportToCode()">VERİYİ KOPYALA</button>
        <button class="btn-action" onclick="importFromCode()">VERİYİ YÜKLE</button>
        <button class="btn-action" style="color:var(--danger-color)" onclick="confirmClear()">TÜMÜNÜ SİL</button>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _p = "knglrpsikersakatbırakır";
    let activeMarkers = {}; // Leaflet objelerini saklamak için

    function checkLogin() {
        if (document.getElementById('passInput').value === _p) {
            sessionStorage.setItem('map_auth', 'true');
            showMainContent();
        } else { alert("Erişim reddedildi."); }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    function toggleChecklist() {
        document.getElementById('gta-checklist').classList.toggle('active');
        const btn = document.getElementById('checklist-toggle');
        btn.innerText = btn.classList.contains('active') ? '[ < ]' : '[ > ]';
    }

    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }

    // --- LOKASYONA GİTME VE YANIP SÖNME ---
    function flyToMarker(id, lat, lng, map) {
        map.flyTo([lat, lng], 1, { animate: true, duration: 1.2 });
        const markerObj = activeMarkers[id];
        if (markerObj) {
            const el = markerObj.getElement();
            el.classList.add('pulse-active');
            setTimeout(() => el.classList.remove('pulse-active'), 2000);
        }
    }

    function initApp() {
        const dbName = "MapStore_v92";
        let db, savedMarkers = [], customIcon = null;
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("config");
            db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { 
                savedMarkers = ev.target.result || [];
                savedMarkers.sort((a, b) => (a.order || 0) - (b.order || 0));
                render(); 
            };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        function render() {
            markerLayer.clearLayers();
            activeMarkers = {};
            const listContainer = document.getElementById('checklist-items');
            listContainer.innerHTML = ''; 

            savedMarkers.forEach((d, index) => {
                // LISTE ELEMANI
                const listItem = document.createElement('div');
                listItem.className = 'gta-list-item';
                listItem.draggable = true;
                let dotColor = d.type === 'red' ? 'var(--danger-color)' : (d.type === 'green' ? 'var(--primary-color)' : '#fff');
                listItem.style.borderLeftColor = dotColor;

                listItem.innerHTML = `
                    <div class="item-content-wrapper" onclick="flyToMarker(${d.id}, ${d.lat}, ${d.lng}, map)" style="flex:1; cursor:pointer;">
                        <div style="font-size:11px; font-weight:700; color:#fff;">${d.text || 'DATA #'+(index+1)}</div>
                        <div style="font-size:9px; color:var(--text-muted);">X: ${d.lng.toFixed(1)} | Y: ${d.lat.toFixed(1)}</div>
                    </div>
                    <div style="width:8px; height:8px; border-radius:50%; background:${dotColor};"></div>
                `;

                // Sürükle-Bırak Mantığı (Orijinal Kodun)
                listItem.ondragstart = (e) => { e.dataTransfer.setData('idx', index); listItem.classList.add('dragging'); };
                listItem.ondragend = () => listItem.classList.remove('dragging');
                listItem.ondragover = (e) => e.preventDefault();
                listItem.ondrop = (e) => {
                    const fromIdx = e.dataTransfer.getData('idx');
                    const item = savedMarkers.splice(fromIdx, 1)[0];
                    savedMarkers.splice(index, 0, item);
                    const tx = db.transaction("markers", "readwrite");
                    savedMarkers.forEach((m, i) => { m.order = i; tx.objectStore("markers").put(m); });
                    render();
                };

                listContainer.appendChild(listItem);

                // HARITA MARKER
                let mClass = d.type === 'red' ? 'fill-red' : (d.type === 'green' ? 'fill-green' : (d.type === 'black' ? 'hollow-black' : ''));
                const icon = L.divIcon({ 
                    className: `pixel-marker`, iconSize: [d.size, d.size], iconAnchor: [d.size/2, d.size/2],
                    html: `<div class="icon-box ${mClass}" style="${d.img ? 'background-image:url('+d.img+')' : ''}">${d.text ? `<div class="marker-label">${d.text}</div>` : ''}</div>`
                });
                const m = L.marker([d.lat, d.lng], { icon: icon, draggable: true }).addTo(markerLayer);
                activeMarkers[d.id] = m;

                m.on('dragend', ev => {
                    d.lat = ev.target.getLatLng().lat; d.lng = ev.target.getLatLng().lng;
                    db.transaction("markers", "readwrite").objectStore("markers").put(d);
                    render();
                });
                m.on('contextmenu', () => {
                    db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                    savedMarkers = savedMarkers.filter(x => x.id !== d.id);
                    render();
                });
            });
        }

        map.on('click', e => {
            if (!mapLayer) return;
            const markerData = { 
                id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, 
                size: parseInt(document.getElementById('sizeSlider').value), 
                type: document.getElementById('typeSelect').value,
                text: document.getElementById('markerTextInput').value,
                img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null,
                order: savedMarkers.length
            };
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img"); loadMap(ev.target.result); };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };
    }

    function exportToCode() { const c = JSON.stringify(activeMarkers); navigator.clipboard.writeText(c); alert("Kopyalandı."); }
    function confirmClear() { if(confirm("Emin misin?")) { /* DB clear mantığı */ location.reload(); } }
    window.onload = () => { if (sessionStorage.getItem('map_auth') === 'true') showMainContent(); };
</script>
</body>
</html>
