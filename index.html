<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body{margin:0;padding:0;background:#0c141d;font-family:sans-serif;color:#fff;overflow:hidden}#login-area{position:fixed;top:0;left:0;width:100%;height:100%;background:#0c141d;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}.box{background:#1a1a1a;padding:30px;border-radius:15px;border:2px solid #00ff00;text-align:center;width:280px}input[type="password"]{padding:12px;width:100%;border-radius:5px;border:1px solid #444;background:#222;color:#fff;margin-bottom:15px;box-sizing:border-box}button{width:100%;padding:12px;background:#00ff00;border:none;font-weight:700;cursor:pointer;border-radius:5px;color:#000}#main-content{display:none}#map{height:100vh;width:100vw}#controls{position:fixed;top:10px;left:10px;z-index:1000;background:rgba(0,0,0,.9);padding:15px;border-radius:12px;border:1px solid #444;width:260px;max-height:90vh;overflow-y:auto}.section{border-bottom:1px solid #333;padding-bottom:10px;margin-bottom:10px}.section-title{font-size:12px;color:#00ff00;display:block;margin-bottom:8px}.pixel-marker{border:2px solid #fff;display:flex;align-items:center;justify-content:center}.pixel-marker div{width:100%;height:100%;background-size:contain!important;background-position:center!important;background-repeat:no-repeat!important}
</style>
</head>
<body>
<div id="login-area"><div class="box"><h2>GİRİŞ</h2><input type="password" id="pass" placeholder="Şifre..."><label style="display:block;margin-bottom:10px;font-size:12px"><input type="checkbox" id="rem"> Beni Hatırla</label><button onclick="login()">GİRİŞ YAP</button></div></div>
<div id="main-content">
    <div id="controls">
        <div class="section"><span class="section-title">HARİTA</span><input type="file" id="mIn" accept="image/*"></div>
        <div class="section"><span class="section-title">İŞARETÇİ</span><input type="file" id="iIn" accept="image/*"><select id="tSe" style="width:100%;margin-top:5px;background:#333;color:#fff;padding:5px"><option value="red">Kırmızı</option><option value="green">Yeşil</option><option value="custom_img">Özel</option></select><input type="range" id="sSl" min="10" max="150" value="40" style="width:100%"></div>
        <button onclick="logout()" style="background:#c0392b;margin-top:10px;color:white">ÇIKIŞ</button>
    </div>
    <div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Şifre: knglsikersakatbırakır
    function login() {
        const i = document.getElementById('pass').value.trim();
        const r = document.getElementById('rem').checked;
        const s = "knglsikersakatbırakır";

        if(i === s) {
            if(r) localStorage.setItem('map_auth', 'ok');
            else sessionStorage.setItem('map_auth', 'ok');
            start();
        } else {
            alert('Hatalı!');
        }
    }

    function start(){document.getElementById('login-area').style.display='none';document.getElementById('main-content').style.display='block';app();}
    function logout(){localStorage.removeItem('map_auth');sessionStorage.removeItem('map_auth');location.reload();}
    window.onload=()=>{if(localStorage.getItem('map_auth')==='ok'||sessionStorage.getItem('map_auth')==='ok')start();};

    function app(){
        const dbN="MAP_DB_NEW";let db,sD=[],cI=null;const map=L.map('map',{crs:L.CRS.Simple,minZoom:-4,maxZoom:4});let cL=null,mL=L.layerGroup().addTo(map);
        const req=indexedDB.open(dbN,1);req.onupgradeneeded=e=>{db=e.target.result;db.createObjectStore("s");db.createObjectStore("m",{keyPath:"id"});};
        req.onsuccess=e=>{db=e.target.result;const t=db.transaction(["s","m"],"readonly");t.objectStore("s").get("map").onsuccess=ev=>{if(ev.target.result)lM(ev.target.result)};t.objectStore("m").getAll().onsuccess=ev=>{sD=ev.target.result||[];rM()}};
        function lM(s){const i=new Image();i.onload=function(){if(cL)map.removeLayer(cL);const b=[[0,0],[this.height,this.width]];cL=L.imageOverlay(s,b).addTo(map);map.fitBounds(b);rM()};i.src=s}
        document.getElementById('mIn').onchange=e=>{const r=new FileReader();r.onload=ev=>{db.transaction("s","readwrite").objectStore("s").put(ev.target.result,"map");lM(ev.target.result)};r.readAsDataURL(e.target.files[0])};
        document.getElementById('iIn').onchange=e=>{const r=new FileReader();r.onload=ev=>{cI=ev.target.result;document.getElementById('tSe').value='custom_img'};r.readAsDataURL(e.target.files[0])};
        map.on('click',e=>{if(!cL)return;const o={id:Date.now(),lat:e.latlng.lat,lng:e.latlng.lng,size:parseInt(document.getElementById('sSl').value),type:document.getElementById('tSe').value,img:document.getElementById('tSe').value==='custom_img'?cI:null};db.transaction("m","readwrite").objectStore("m").add(o);sD.push(o);rM()});
        function rM(){mL.clearLayers();sD.forEach(d=>{const i=L.divIcon({className:`pixel-marker`,iconSize:[d.size,d.size],iconAnchor:[d.size/2,d.size/2],html:`<div style="background-image:${d.img?'url('+d.img+')':'none'};background-color:${d.type==='red'?'rgba(255,0,0,.6)':d.type==='green'?'rgba(0,255,0,.6)':'transparent'}"></div>`});const m=L.marker([d.lat,d.lng],{icon:i,draggable:true}).addTo(mL);m.on('dragend',ev=>{const f=sD.find(x=>x.id===d.id);f.lat=ev.target.getLatLng().lat;f.lng=ev.target.getLatLng().lng;db.transaction("m","readwrite").objectStore("m").put(f)});m.on('contextmenu',()=>{db.transaction("m","readwrite").objectStore("m").delete(d.id);sD=sD.filter(x=>x.id!==d.id);rM()})})}
    }
    document.getElementById('pass').addEventListener('keypress',e=>{if(e.key==='Enter')login()});
</script>
</body>
</html>
