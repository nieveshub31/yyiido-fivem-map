<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Map System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-color: #00ff00;
            --bg-dark: #0c141d;
            --panel-bg: rgba(20, 26, 34, 0.98);
            --border-color: #333;
            --input-bg: #1a222c;
            --glow-color: rgba(0, 255, 0, 0.8);
            --danger: #ff4444;
        }
        
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

        /* Giriş */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid var(--primary-color); text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { color: var(--primary-color); letter-spacing: 2px; margin-bottom: 25px; }
        .login-box input[type="password"] { padding: 15px; width: 100%; border-radius: 8px; border: 1px solid #444; background: #222; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 15px; background: var(--primary-color); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #000; transition: 0.3s; }

        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); z-index: 1; }

        /* KNGLRP Logo Buton */
        #main-logo {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            font-weight: 900; font-size: 16px; letter-spacing: 3px;
            color: #fff; background: var(--panel-bg); padding: 10px 20px;
            border-radius: 8px; border: 1px solid var(--primary-color);
            cursor: pointer; animation: kngl-glow 2s infinite alternate;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s;
        }
        @keyframes kngl-glow {
            0% { text-shadow: 0 0 2px #fff, 0 0 5px var(--glow-color); box-shadow: 0 0 5px var(--glow-color); }
            100% { text-shadow: 0 0 5px #fff, 0 0 15px var(--glow-color), 0 0 25px var(--primary-color); box-shadow: 0 0 15px var(--primary-color); }
        }

        /* Panel */
        #controls {
            position: fixed; top: 80px; left: 20px; z-index: 1000;
            background: var(--panel-bg); padding: 25px; border-radius: 16px;
            border: 1px solid var(--border-color); width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(12px);
            max-height: 85vh; overflow-y: auto; overflow-x: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #controls.collapsed { transform: translateY(-20px) translateX(-350px); opacity: 0; pointer-events: none; }

        .panel-header { font-size: 13px; font-weight: 800; color: var(--primary-color); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; text-transform: uppercase; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 10px; font-weight: 900; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .input-group { background: var(--input-bg); border-radius: 10px; padding: 12px; border: 1px solid #2a3441; margin-bottom: 10px; }
        
        input[type="file"], select { width: 100%; cursor: pointer; background: #2a3441; color: white; border: none; border-radius: 6px; padding: 8px; box-sizing: border-box; outline: none; font-size: 12px; }
        
        .switch-group { display: flex; align-items: center; justify-content: space-between; background: var(--input-bg); padding: 15px; border-radius: 10px; border: 1px solid #2a3441; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; font-size: 11px; }
        .btn-clear { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-clear:hover { background: var(--danger); color: #fff; }
        .btn-backup { background: rgba(0, 255, 0, 0.1); color: var(--primary-color); border: 1px solid var(--primary-color); }
        .btn-backup:hover { background: var(--primary-color); color: #000; }
        .btn-logout { background: #2a1212; color: #ff5555; border: 1px solid #441a1a; margin-top: 20px; }

        /* Marker Styles */
        .pixel-marker { border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.8); background: transparent !important; }
        .pixel-marker div { width: 100%; height: 100%; border-radius: 50%; background-size: cover !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="login-overlay">
    <div class="login-box">
        <h2>yyiido nieves - Map System</h2>
        <input type="password" id="passInput" placeholder="Erişim Şifresi">
        <label style="display:flex; align-items:center; gap:10px; margin-bottom:20px; cursor:pointer; font-size:14px; color:#888;">
            <input type="checkbox" id="rememberCheck"> Beni Hatırla
        </label>
        <button onclick="checkLogin()">KİLİDİ AÇ</button>
        <p id="error-msg" style="color:#ff4444; font-size:12px; margin-top:15px; display:none;">Hatalı şifre!</p>
    </div>
</div>

<div id="main-content">
    <div id="main-logo" onclick="togglePanel()">KNGLRP</div>

    <div id="controls">
        <div class="panel-header">KONTROL PANELİ</div>
        
        <div class="section">
            <span class="section-title">HARİTA KATMANI</span>
            <div class="input-group"><input type="file" id="mainMapInput" accept="image/*"></div>
        </div>

        <div class="section">
            <span class="section-title">İŞARETÇİ AYARLARI</span>
            <div class="input-group">
                <input type="file" id="markerImgInput" accept="image/*" style="margin-bottom:12px">
                <select id="typeSelect">
                    <option value="red">⭕ Kırmızı Çember</option>
                    <option value="green">⭕ Yeşil Çember</option>
                    <option value="black">⭕ Siyah Çember</option>
                    <option value="custom_img">🖼️ Özel İkon</option>
                </select>
                <input type="range" id="sizeSlider" min="10" max="150" value="40">
            </div>
        </div>

        <div class="section">
            <span class="section-title">SİSTEM MODU</span>
            <div class="switch-group">
                <span style="font-size:12px;">Düzenleme Modu</span>
                <label class="switch">
                    <input type="checkbox" id="editMode" checked onchange="refreshMap()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="section" style="border-top: 1px solid #333; padding-top: 15px;">
            <span class="section-title">VERİ YÖNETİMİ</span>
            <button class="btn-action btn-backup" onclick="alert('Veriler yerel tarayıcı belleğine (IndexedDB) kaydedildi.')">VERİLERİ YEDEKLE</button>
            <button class="btn-action btn-clear" onclick="confirmClear()">TÜMÜNÜ SİL</button>
            <button class="btn-action btn-logout" onclick="logout()">OTURUMU KAPAT</button>
        </div>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _p = ['h','a','y','a','t','ç','o','k','z','o','r','y','a'].join('');

    function checkLogin() {
        if (document.getElementById('passInput').value === _p) {
            if (document.getElementById('rememberCheck').checked) localStorage.setItem('map_session', 'active');
            else sessionStorage.setItem('map_session', 'active');
            showMainContent();
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    window.onload = () => { if (localStorage.getItem('map_session')==='active' || sessionStorage.getItem('map_session')==='active') showMainContent(); };

    function logout() { localStorage.clear(); sessionStorage.clear(); location.reload(); }

    let globalApp = null; 
    function refreshMap() { if(globalApp) globalApp.render(); }
    
    function confirmClear() {
        if(confirm("DİKKAT! Tüm işaretçiler kalıcı olarak silinecek. Emin misin aşkım?")) {
            if(globalApp) globalApp.clearMarkers();
        }
    }

    function initApp() {
        const dbName = "MapStore_v6";
        let db, savedMarkers = [], customIcon = null;
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            if(!db.objectStoreNames.contains("config")) db.createObjectStore("config");
            if(!db.objectStoreNames.contains("markers")) db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { savedMarkers = ev.target.result || []; render(); };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            // Düzenleme kapalıyken tıklama ile işaretçi eklenmez, harita yine de kaydırılabilir.
            if (!mapLayer || !document.getElementById('editMode').checked) return;
            
            const markerData = { 
                id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, 
                size: parseInt(document.getElementById('sizeSlider').value), 
                type: document.getElementById('typeSelect').value, 
                img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null 
            };
            
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        function render() {
            markerLayer.clearLayers();
            const isEditable = document.getElementById('editMode').checked;
            
            savedMarkers.forEach(d => {
                let borderColor = '#ffffff';
                if (d.type === 'red') borderColor = '#ff4444';
                else if (d.type === 'green') borderColor = '#00ff00';
                else if (d.type === 'black') borderColor = '#000000';

                const style = `
                    background-image:${d.img?'url('+d.img+')':'none'}; 
                    border: 3px solid ${borderColor};
                    box-shadow: 0 0 10px ${borderColor === '#000000' ? 'rgba(255,255,255,0.2)' : borderColor};
                `;
                
                const icon = L.divIcon({ 
                    className: 'pixel-marker', 
                    iconSize: [d.size, d.size], 
                    iconAnchor: [d.size/2, d.size/2], 
                    html: `<div style="${style}"></div>` 
                });

                const m = L.marker([d.lat, d.lng], { icon: icon, draggable: isEditable }).addTo(markerLayer);
                
                if(isEditable) {
                    m.on('dragend', ev => {
                        const found = savedMarkers.find(x => x.id === d.id);
                        found.lat = ev.target.getLatLng().lat; found.lng = ev.target.getLatLng().lng;
                        db.transaction("markers", "readwrite").objectStore("markers").put(found);
                    });
                    m.on('contextmenu', () => {
                        db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                        savedMarkers = savedMarkers.filter(x => x.id !== d.id); 
                        render();
                    });
                }
            });
        }

        function clearMarkers() {
            db.transaction("markers", "readwrite").objectStore("markers").clear();
            savedMarkers = [];
            render();
        }

        globalApp = { render, clearMarkers };
    }
    document.getElementById('passInput').addEventListener('keypress', e => { if(e.key==='Enter') checkLogin() });
</script>
</body>
</html>
