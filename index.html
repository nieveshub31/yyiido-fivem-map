<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Harita Paneli</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-color: #00ff00;
            --bg-dark: #0c141d;
            --panel-bg: rgba(20, 26, 34, 0.95);
            --border-color: #333;
        }
        
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; overflow: hidden; }
        
        /* Giriş Ekranı */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid var(--primary-color); text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { color: var(--primary-color); letter-spacing: 2px; margin-bottom: 25px; }
        .login-box input[type="password"] { padding: 15px; width: 100%; border-radius: 8px; border: 1px solid #444; background: #222; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 15px; background: var(--primary-color); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #000; transition: 0.3s; }
        .login-box button:hover { background: #00cc00; transform: translateY(-2px); }

        /* Ana Arayüz */
        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); }

        /* Sol Kontrol Paneli */
        #controls {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--panel-bg); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border-color); width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); backdrop-filter: blur(10px);
        }
        
        .panel-header { font-size: 18px; font-weight: bold; color: var(--primary-color); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

        .section { margin-bottom: 20px; }
        .section-title { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }
        
        /* Özel Input Tasarımları */
        .input-group { background: #1a222c; border-radius: 8px; padding: 10px; border: 1px solid #2a3441; margin-bottom: 8px; }
        input[type="file"] { font-size: 12px; color: #ccc; cursor: pointer; }
        select { background: #2a3441; color: white; border: none; padding: 8px; border-radius: 6px; width: 100%; cursor: pointer; outline: none; margin-top: 5px; }
        
        .slider-wrap { margin-top: 10px; }
        input[type="range"] { width: 100%; accent-color: var(--primary-color); cursor: pointer; }

        /* Butonlar */
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-logout { background: #3d1414; color: #ff5555; border: 1px solid #551a1a; }
        .btn-logout:hover { background: #5a1a1a; color: white; }

        .pixel-marker { border: 2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pixel-marker div { width: 100%; height: 100%; background-size: contain !important; background-position: center !important; background-repeat: no-repeat !important; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>SİSTEME GİRİŞ</h2>
        <input type="password" id="passInput" placeholder="Erişim Şifresi">
        <label style="display:flex; align-items:center; gap:10px; margin-bottom:20px; cursor:pointer; font-size:14px; color:#888;">
            <input type="checkbox" id="rememberCheck" style="accent-color:var(--primary-color)"> Beni Hatırla
        </label>
        <button onclick="checkLogin()">KİLİDİ AÇ</button>
        <p id="error-msg" style="color:#ff4444; font-size:12px; margin-top:15px; display:none;">Hatalı şifre denemesi!</p>
    </div>
</div>

<div id="main-content">
    <div id="controls">
        <div class="panel-header">KONTROL PANELİ</div>
        
        <div class="section">
            <span class="section-title">HARİTA KATMANI</span>
            <div class="input-group">
                <input type="file" id="mainMapInput" accept="image/*">
            </div>
        </div>

        <div class="section">
            <span class="section-title">İŞARETÇİ AYARLARI</span>
            <div class="input-group">
                <label style="font-size:11px; color:#666">Özel İkon:</label>
                <input type="file" id="markerImgInput" accept="image/*" style="margin-bottom:10px">
                <select id="typeSelect">
                    <option value="red">🔴 Kırmızı Nokta</option>
                    <option value="green">🟢 Yeşil Nokta</option>
                    <option value="custom_img">🖼️ Özel İkon</option>
                </select>
                <div class="slider-wrap">
                    <label style="font-size:11px; color:#666">Boyut:</label>
                    <input type="range" id="sizeSlider" min="10" max="150" value="40">
                </div>
            </div>
        </div>

        <button class="btn-action btn-logout" onclick="logout()">
            OTURUMU KAPAT
        </button>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ŞİFRE AYNI KALDI
    const _s1="kngl", _s2="sike", _s3="rsak", _s4="atbı", _s5="rakır";
    
    function checkLogin() {
        const p = document.getElementById('passInput').value;
        const r = document.getElementById('rememberCheck').checked;
        if (p === (_s1+_s2+_s3+_s4+_s5)) {
            if (r) localStorage.setItem('map_session', 'active');
            else sessionStorage.setItem('map_session', 'active');
            showMainContent();
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    window.onload = () => {
        if (localStorage.getItem('map_session')==='active' || sessionStorage.getItem('map_session')==='active') showMainContent();
    };

    function logout() {
        localStorage.removeItem('map_session');
        sessionStorage.removeItem('map_session');
        location.reload();
    }

    function initApp() {
        const dbName = "MapStore_v5"; // Veritabanı versiyonunu güncelledik
        let db, savedMarkers = [], customIcon = null;
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3 });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            if(!db.objectStoreNames.contains("config")) db.createObjectStore("config");
            if(!db.objectStoreNames.contains("markers")) db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { savedMarkers = ev.target.result || []; render(); };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            if (!mapLayer) return;
            const markerData = { id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, size: parseInt(document.getElementById('sizeSlider').value), type: document.getElementById('typeSelect').value, img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null };
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        function render() {
            markerLayer.clearLayers();
            savedMarkers.forEach(d => {
                const style = `background-image:${d.img?'url('+d.img+')':'none'}; background-color:${d.type==='red'?'rgba(255,0,0,0.6)':d.type==='green'?'rgba(0,255,0,0.6)':'transparent'}`;
                const icon = L.divIcon({ className: 'pixel-marker', iconSize: [d.size, d.size], iconAnchor: [d.size/2, d.size/2], html: `<div style="${style}"></div>` });
                const m = L.marker([d.lat, d.lng], { icon: icon, draggable: true }).addTo(markerLayer);
                m.on('dragend', ev => {
                    const found = savedMarkers.find(x => x.id === d.id);
                    found.lat = ev.target.getLatLng().lat; found.lng = ev.target.getLatLng().lng;
                    db.transaction("markers", "readwrite").objectStore("markers").put(found);
                });
                m.on('contextmenu', () => {
                    db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                    savedMarkers = savedMarkers.filter(x => x.id !== d.id); render();
                });
            });
        }
    }
    document.getElementById('passInput').addEventListener('keypress', e => { if(e.key==='Enter') checkLogin() });
</script>
</body>
</html>
