<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Map System v1.3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ff00;
            --danger-color: #ff4444;
            --info-color: #00d4ff;
            --bg-dark: #080c10;
            --panel-bg: rgba(13, 17, 23, 0.96);
            --border-color: #30363d;
            --input-bg: #0d1117;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --font-tech: 'JetBrains Mono', monospace;
        }
        
        body, html, #map, .leaflet-container, * { cursor: crosshair !important; }
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; color: var(--text-main); overflow: hidden; }
        * { box-sizing: border-box; }

        /* GİRİŞ EKRANI */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #111b27 0%, #080c10 100%); 
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: rgba(22, 27, 34, 0.85); padding: 50px 40px; border-radius: 24px; 
            border: 1px solid rgba(48, 54, 61, 0.5); text-align: center; width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(25px);
        }
        .login-box input { 
            padding: 18px; width: 100%; border-radius: 12px; border: 1px solid var(--border-color); 
            background: var(--input-bg); color: white; margin-bottom: 15px; outline: none; 
            text-align: center; font-family: var(--font-tech); font-size: 16px;
        }
        .login-box button { 
            width: 100%; padding: 18px; background: var(--primary-color); border: none; 
            font-weight: 900; border-radius: 12px; color: #000; cursor: pointer; text-transform: uppercase; font-family: var(--font-tech);
        }

        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); z-index: 1; }

        /* KONTROLLER */
        .ui-overlay { position: fixed; z-index: 1001; pointer-events: none; }
        .ui-overlay * { pointer-events: auto; }
        
        .top-left { top: 15px; left: 15px; display: flex; gap: 10px; }
        .top-right { top: 15px; right: 15px; }

        #main-logo, #help-btn, #nav-toggle {
            font-weight: 900; font-size: 14px; color: #fff; background: var(--panel-bg); 
            padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border-color); 
            transition: 0.3s; cursor: pointer; font-family: var(--font-tech);
        }
        #main-logo:hover { border-color: var(--primary-color); color: var(--primary-color); }
        #nav-toggle:hover { border-color: var(--info-color); color: var(--info-color); }

        /* SOL PANEL (AYARLAR) */
        #controls {
            position: fixed; top: 75px; left: 15px; z-index: 1000;
            background: var(--panel-bg); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border-color); width: 260px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #controls.collapsed { transform: translateX(-320px); opacity: 0; }

        /* SAĞ PANEL (GTA STİLİ NAVİGASYON) */
        #right-nav {
            position: fixed; top: 75px; right: 15px; z-index: 1000;
            background: rgba(13, 17, 23, 0.9); padding: 0; border-radius: 12px;
            border: 1px solid var(--border-color); width: 240px;
            max-height: 70vh; overflow: hidden; display: flex; flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(300px);
        }
        #right-nav.active { transform: translateX(0); }
        .nav-header { background: rgba(255, 255, 255, 0.05); padding: 15px; font-family: var(--font-tech); font-weight: 800; font-size: 12px; border-bottom: 1px solid var(--border-color); color: var(--info-color); }
        #nav-list { overflow-y: auto; flex-grow: 1; list-style: none; padding: 0; margin: 0; }
        .nav-item { 
            padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px;
            font-size: 13px; font-weight: 600; text-transform: uppercase;
        }
        .nav-item:hover { background: var(--primary-color); color: #000; }
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; }

        /* MARKER & EFEKT */
        .pixel-marker { display: flex; align-items: center; justify-content: center; }
        .icon-box { width: 100%; height: 100%; border-radius: 50%; background-size: cover !important; position: relative; transition: 0.3s; }
        
        .marker-label {
            position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: #fff; padding: 4px 10px; border-radius: 4px;
            font-size: 11px; font-weight: 800; font-family: var(--font-tech); white-space: nowrap;
            border: 1px solid var(--primary-color); backdrop-filter: blur(4px); pointer-events: none;
        }

        /* TIKLAMA EFEKTİ (PULSE) */
        @keyframes marker-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        .pulse-effect { animation: marker-pulse 0.8s ease-out 3; border: 4px solid white !important; z-index: 9999 !important; }

        /* FORM ELEMANLARI */
        .section-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; font-family: var(--font-tech); }
        .input-group { background: var(--input-bg); border-radius: 8px; padding: 10px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        select, input[type="text"] { width: 100%; background: #000; color: #fff; border: 1px solid var(--border-color); border-radius: 5px; padding: 8px; font-size: 12px; margin-bottom: 5px; }
        .btn-action { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: 800; font-size: 11px; font-family: var(--font-tech); cursor: pointer; margin-bottom: 5px; }
        .btn-export { background: var(--info-color); color: #000; }
        
        .fill-red { border: 2px solid var(--danger-color); background: rgba(255, 68, 68, 0.4); }
        .fill-green { border: 2px solid var(--primary-color); background: rgba(0, 255, 0, 0.4); }
        .hollow-black { border: 2px solid #000; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="font-family:var(--font-tech); color:#fff; letter-spacing:4px;">YYIIDO NIEVES</h2>
        <input type="password" id="passInput" placeholder="ERIŞIM KODU">
        <button onclick="checkLogin()">SISTEME GIR</button>
    </div>
</div>

<div id="main-content">
    <div class="ui-overlay top-left">
        <div id="main-logo" onclick="togglePanel()">KNGLRP</div>
    </div>

    <div class="ui-overlay top-right">
        <div id="nav-toggle" onclick="toggleRightNav()">LISTE ☰</div>
    </div>

    <div id="controls">
        <div class="section">
            <span class="section-title">HARITA GÖRSELİ</span>
            <div class="input-group"><input type="file" id="mainMapInput" accept="image/*" style="background:transparent; border:none;"></div>
        </div>

        <div class="section">
            <span class="section-title">İŞARETLEME</span>
            <div class="input-group">
                <input type="text" id="markerTextInput" placeholder="KONUM ADI...">
                <select id="typeSelect">
                    <option value="green">🟢 GÜVENLİ BÖLGE</option>
                    <option value="red">🔴 RİSKLİ BÖLGE</option>
                    <option value="custom_img">🖼️ ÖZEL İKON</option>
                </select>
                <input type="file" id="markerImgInput" accept="image/*" style="margin-top:5px; font-size:10px;">
            </div>
        </div>

        <button class="btn-action btn-export" onclick="exportToCode()">VERILERI KOPYALA</button>
        <button class="btn-action" style="background:#21262d; color:#fff; margin-top:10px;" onclick="location.reload()">ÇIKIŞ YAP</button>
    </div>

    <div id="right-nav">
        <div class="nav-header">KAYITLI LOKASYONLAR</div>
        <ul id="nav-list">
            </ul>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _p = "knglrpsikersakatbırakır";

    function checkLogin() {
        if (document.getElementById('passInput').value === _p) {
            sessionStorage.setItem('map_auth', 'true');
            showMainContent();
        } else { alert("Erişim reddedildi."); }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    window.onload = () => { if (sessionStorage.getItem('map_auth') === 'true') showMainContent(); };

    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }
    function toggleRightNav() { document.getElementById('right-nav').classList.toggle('active'); }

    function initApp() {
        const dbName = "MapSystem_v92";
        let db, savedMarkers = [], customIcon = null, markerInstances = {};
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("config");
            db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { savedMarkers = ev.target.result || []; render(); };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            if (!mapLayer) return;
            const text = document.getElementById('markerTextInput').value.trim();
            const markerData = { 
                id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, 
                size: 40, 
                type: document.getElementById('typeSelect').value,
                text: text || "İsimsiz Nokta",
                img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null
            };
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            document.getElementById('markerTextInput').value = "";
            render();
        });

        window.goToLocation = function(id) {
            const data = savedMarkers.find(x => x.id === id);
            const marker = markerInstances[id];
            if (data && marker) {
                map.flyTo([data.lat, data.lng], 1, { duration: 1.5 });
                
                // Efekt Ekle
                const el = marker.getElement().querySelector('.icon-box');
                el.classList.add('pulse-effect');
                setTimeout(() => el.classList.remove('pulse-effect'), 2500);

                if(window.innerWidth < 768) toggleRightNav();
            }
        };

        function render() {
            markerLayer.clearLayers();
            markerInstances = {};
            const navList = document.getElementById('nav-list');
            navList.innerHTML = "";

            savedMarkers.forEach(d => {
                // Listeye ekle
                const li = document.createElement('li');
                li.className = 'nav-item';
                const dotColor = d.type === 'green' ? '#00ff00' : (d.type === 'red' ? '#ff4444' : '#00d4ff');
                li.innerHTML = `<div class="nav-dot" style="background:${dotColor}"></div> ${d.text}`;
                li.onclick = () => goToLocation(d.id);
                navList.appendChild(li);

                // Haritaya ekle
                let mClass = d.type === 'red' ? 'fill-red' : (d.type === 'green' ? 'fill-green' : '');
                const icon = L.divIcon({ 
                    className: 'pixel-marker', 
                    iconSize: [d.size, d.size], 
                    iconAnchor: [d.size/2, d.size/2],
                    html: `
                        <div class="icon-box ${mClass}" style="${d.img ? 'background-image:url('+d.img+')' : ''}">
                            <div class="marker-label">${d.text}</div>
                        </div>`
                });
                
                const m = L.marker([d.lat, d.lng], { icon: icon }).addTo(markerLayer);
                markerInstances[d.id] = m;

                m.on('contextmenu', () => {
                    db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                    savedMarkers = savedMarkers.filter(x => x.id !== d.id); 
                    render();
                });
            });
        }

        window.exportToCode = () => {
            navigator.clipboard.writeText(JSON.stringify(savedMarkers)).then(() => alert("Tüm koordinatlar kopyalandı!"));
        };
    }
    document.getElementById('passInput').onkeypress = e => { if(e.key==='Enter') checkLogin() };
</script>
</body>
</html>
