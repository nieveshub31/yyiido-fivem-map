<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Map System v1.3 LUX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* LUX THEME COLORS */
            --primary-color: #00e5ff; /* Premium Cyan */
            --danger-color: #ff3366; 
            --info-color: #a277ff; 
            --bg-dark: #050505;
            --panel-bg: rgba(10, 12, 16, 0.75); /* Cam efekti için daha saydam */
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.2);
            --input-bg: rgba(0, 0, 0, 0.5);
            --text-main: #f0f4f8;
            --text-muted: #718096;
            --font-main: 'Inter', sans-serif;
            --font-tech: 'JetBrains Mono', monospace;
        }
        
        body, html, #map, .leaflet-container, * { cursor: crosshair !important; }
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: var(--font-main); color: var(--text-main); overflow: hidden; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }

        /* Kaydırma Çubuğu Gizleme / Stilize Etme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #0a0e14 0%, #030405 100%); 
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: var(--panel-bg); padding: 50px 40px; border-radius: 24px; 
            border: 1px solid var(--border-color); text-align: center; width: 400px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(255,255,255,0.05); 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
        }
        .login-box h2 { color: #fff; letter-spacing: 4px; margin-bottom: 30px; font-size: 18px; font-weight: 800; font-family: var(--font-tech); text-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
        .login-box input[type="password"] { 
            padding: 16px; width: 100%; border-radius: 12px; border: 1px solid var(--border-highlight); 
            background: var(--input-bg); color: white; margin-bottom: 20px; outline: none; 
            text-align: center; font-family: var(--font-tech); font-size: 15px; cursor: text !important;
            transition: 0.3s;
        }
        .login-box input[type="password"]:focus { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        .login-box button { 
            width: 100%; padding: 16px; background: transparent; border: 1px solid var(--primary-color); 
            font-weight: 800; border-radius: 12px; color: var(--primary-color); transition: 0.3s; 
            text-transform: uppercase; font-family: var(--font-tech); letter-spacing: 2px;
        }
        .login-box button:hover { background: var(--primary-color); color: #000; box-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }

        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); z-index: 1; }

        .top-controls { position: fixed; top: 20px; left: 20px; z-index: 1001; display: flex; gap: 12px; }
        #main-logo, #help-btn {
            font-weight: 900; font-size: 13px; color: #fff; background: var(--panel-bg); 
            padding: 12px 22px; border-radius: 12px; border: 1px solid var(--border-color); 
            transition: 0.3s; cursor: pointer !important; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.03);
            backdrop-filter: blur(20px); font-family: var(--font-tech); letter-spacing: 1px;
        }
        #main-logo:hover { border-color: var(--primary-color); color: var(--primary-color); }
        #help-btn { color: var(--info-color); border-color: rgba(162, 119, 255, 0.3); }

        /* --- MODERN AÇILIR LİSTE (SÜRÜKLE BIRAKLI) --- */
        #gta-checklist {
            position: fixed; top: 20px; right: 20px; z-index: 1001;
            display: flex; flex-direction: column; gap: 5px; max-height: 90vh; width: 340px;
            transition: 0.5s cubic-bezier(0.25, 1, 0.5, 1); transform: translateX(110%);
        }
        #gta-checklist.active { transform: translateX(0); }

        #checklist-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 1002;
            background: var(--panel-bg); color: var(--primary-color);
            border: 1px solid var(--border-color); padding: 12px 20px; border-radius: 12px;
            font-family: var(--font-tech); font-weight: 900; font-size: 13px;
            cursor: pointer !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px); transition: 0.3s;
        }
        #checklist-toggle:hover { border-color: var(--primary-color); }
        #checklist-toggle.active { background: var(--primary-color); color: #000; box-shadow: 0 0 20px rgba(0,229,255,0.3); }

        .checklist-inner {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 20px; overflow-y: auto;
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            margin-top: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.03);
        }
        .checklist-header {
            font-family: var(--font-tech); font-size: 11px; font-weight: 800;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }

        .gta-list-item {
            background: var(--input-bg); padding: 12px 16px; margin-bottom: 8px;
            border-radius: 10px; font-family: var(--font-tech); text-transform: uppercase;
            border: 1px solid var(--border-color); border-left: 3px solid var(--primary-color);
            cursor: grab !important; transition: border-color 0.3s, transform 0.2s;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .gta-list-item:active { cursor: grabbing !important; }
        .gta-list-item:hover { border-color: var(--primary-color); background: rgba(255,255,255,0.02); }
        .gta-list-item.dragging { opacity: 0.4; border-style: dashed; transform: scale(0.98); }
        
        .drag-icon {
            color: var(--text-muted); font-size: 14px; opacity: 0.5;
            display: flex; align-items: center; justify-content: center; width: 20px;
        }
        .item-content-wrapper { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .item-row-top { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .item-title { font-size: 12px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .item-coords { font-size: 9px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; }

        /* --- LUX SOL KONTROL PANELİ --- */
        #controls {
            position: fixed; top: 85px; left: 20px; z-index: 1000;
            background: var(--panel-bg); padding: 25px; border-radius: 16px;
            border: 1px solid var(--border-color); width: 300px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.03); 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            max-height: 85vh; overflow-y: auto; transition: 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #controls.collapsed { transform: translateX(-350px); opacity: 0; pointer-events: none; }

        .panel-header { font-family: var(--font-tech); font-size: 11px; font-weight: 800; color: #fff; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .section { margin-bottom: 24px; }
        .section-title { font-family: var(--font-tech); font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 1px; }
        
        /* Lux Input Stilleri */
        select, input[type="file"], input[type="text"] { 
            width: 100%; background: var(--input-bg); color: var(--text-main); 
            border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; 
            font-size: 12px; outline: none; transition: 0.3s; margin-bottom: 10px;
            font-family: var(--font-tech);
        }
        input[type="text"]:focus, select:focus { border-color: var(--primary-color); background: rgba(0,0,0,0.8); }
        
        input[type="range"] {
            -webkit-appearance: none; width: 100%; background: transparent; margin-top: 5px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: var(--border-highlight); border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            height: 14px; width: 14px; border-radius: 50%; background: var(--primary-color);
            cursor: pointer; -webkit-appearance: none; margin-top: -5px; box-shadow: 0 0 10px var(--primary-color);
        }

        /* Modern iOS Tipi Switch */
        .switch-group { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px; margin-bottom: 4px; font-size: 12px; font-weight: 500; font-family: var(--font-tech); color: #ccc;}
        .switch { position: relative; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer !important; top: 0; left: 0; right: 0; bottom: 0; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 20px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: var(--text-muted); border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--primary-color); border-color: var(--primary-color); box-shadow: 0 0 10px rgba(0,229,255,0.3); }
        input:checked + .slider:before { transform: translateX(16px); background: #000; }

        /* Buton Stilleri */
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--input-bg); color: #fff; font-weight: 700; font-size: 10px; text-transform: uppercase; font-family: var(--font-tech); transition: 0.3s; cursor: pointer !important; margin-bottom: 8px; letter-spacing: 1px; }
        .btn-action:hover { background: rgba(255,255,255,0.05); border-color: var(--border-highlight); }
        .btn-clear { color: var(--danger-color); border-color: rgba(255, 51, 102, 0.3); }
        .btn-clear:hover { background: rgba(255, 51, 102, 0.1); border-color: var(--danger-color); }
        .btn-logout { margin-top: 15px; color: var(--text-muted); }

        /* --- MARKER VE ETİKET --- */
        .pixel-marker { display: flex; align-items: center; justify-content: center; overflow: visible !important; }
        .icon-box { width: 100%; height: 100%; border-radius: 50%; background-size: cover !important; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        
        .marker-label {
            position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
            background: rgba(5, 5, 5, 0.9); color: #fff; padding: 6px 12px; border-radius: 6px;
            font-size: 10px; font-weight: 700; font-family: var(--font-tech); white-space: nowrap;
            pointer-events: none; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.7); backdrop-filter: blur(10px); letter-spacing: 1px;
        }

        .fill-red { border: 2px solid var(--danger-color); background: rgba(255, 51, 102, 0.4) !important; box-shadow: 0 0 15px rgba(255,51,102,0.4); }
        .fill-green { border: 2px solid var(--primary-color); background: rgba(0, 229, 255, 0.3) !important; box-shadow: 0 0 15px rgba(0,229,255,0.4); }
        .hollow-black { border: 2px solid #fff; background: rgba(0,0,0,0.6) !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="login-overlay">
    <div class="login-box">
        <h2>YYIIDO NIEVES MAPS</h2>
        <input type="password" id="passInput" placeholder="SİSTEM ŞİFRESİ">
        <button onclick="checkLogin()">GİRİŞ YAP</button>
    </div>
</div>

<div id="main-content">
    <div class="top-controls">
        <div id="main-logo" onclick="togglePanel()">KNGLRP</div>
    </div>

    <button id="checklist-toggle" onclick="toggleChecklist()">[ &gt; ]</button>

    <div id="gta-checklist">
        <div class="checklist-inner">
            <div class="checklist-header">
                <span>LOKASYON VERİTABANI</span>
                <span style="font-size: 9px; opacity: 0.5;">(SÜRÜKLE & BIRAK)</span>
            </div>
            <div id="checklist-items"></div>
        </div>
    </div>

    <div id="controls">
        <div class="panel-header">KONTROL PANELİ</div>
        
        <div class="section">
            <span class="section-title">HARİTA YÜKLE</span>
            <input type="file" id="mainMapInput" accept="image/*">
        </div>

        <div class="section">
            <span class="section-title">İŞARETÇİ OLUŞTURUCU</span>
            <input type="text" id="markerTextInput" placeholder="Etiket (Boş bırakılabilir)">
            <select id="typeSelect">
                <option value="green">🟢 GÜVENLİ LOKASYON</option>
                <option value="red">🔴 RİSKLİ BÖLGE</option>
                <option value="black">⚫ STANDART NOKTA</option>
                <option value="custom_img">🖼️ ÖZEL İKON</option>
            </select>
            <input type="file" id="markerImgInput" accept="image/*" style="margin-top:5px; margin-bottom: 5px;">
            <div style="display: flex; justify-content: space-between; font-size: 9px; color: var(--text-muted); font-family: var(--font-tech); margin-top: 10px;">
                <span>BOYUT</span>
                <span id="sizeValue">40px</span>
            </div>
            <input type="range" id="sizeSlider" min="15" max="150" value="40" oninput="document.getElementById('sizeValue').innerText = this.value + 'px'">
        </div>

        <div class="section">
            <span class="section-title">VERİ AKTARIMI</span>
            <div style="display: flex; gap: 8px;">
                <button class="btn-action" onclick="exportToCode()">KOPYALA</button>
                <button class="btn-action" onclick="importFromCode()">YÜKLE</button>
            </div>
        </div>

        <div class="section">
            <span class="section-title">SİSTEM DURUMU</span>
            <div class="switch-group">
                <span>DÜZENLEME MODU</span>
                <label class="switch"><input type="checkbox" id="editMode" checked onchange="refreshMap()"><span class="slider"></span></label>
            </div>
            <div class="switch-group">
                <span>YENİ NOKTA EKLE</span>
                <label class="switch"><input type="checkbox" id="addMode" checked><span class="slider"></span></label>
            </div>
        </div>

        <div class="section" style="margin-bottom: 0;">
            <button class="btn-action btn-clear" onclick="confirmClear()">TÜMÜNÜ SİL</button>
            <button class="btn-action btn-logout" onclick="logout()">GÜVENLİ ÇIKIŞ</button>
        </div>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _p = "knglrpsikersakatbırakır";

    function checkLogin() {
        if (document.getElementById('passInput').value === _p) {
            sessionStorage.setItem('map_auth', 'true');
            showMainContent();
        } else { alert("Erişim reddedildi."); }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    function toggleChecklist() {
        document.getElementById('gta-checklist').classList.toggle('active');
        const btn = document.getElementById('checklist-toggle');
        btn.classList.toggle('active');
        btn.innerText = btn.classList.contains('active') ? '[ < ]' : '[ > ]';
    }
    window.onload = () => { if (sessionStorage.getItem('map_auth') === 'true') showMainContent(); };
    function logout() { sessionStorage.clear(); location.reload(); }
    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }

    let globalApp = null;
    function refreshMap() { if(globalApp) globalApp.render(); }
    function confirmClear() { if(confirm("Veritabanı sıfırlanacak. Onaylıyor musun?")) globalApp.clearMarkers(); }

    function exportToCode() {
        if(!globalApp) return;
        const code = JSON.stringify(globalApp.getData());
        navigator.clipboard.writeText(code).then(() => alert("Sistem verisi panoya kopyalandı."));
    }

    function importFromCode() {
        if(!globalApp) return;
        const code = prompt("Veri kodunu yapıştırın:");
        if(code) {
            try { globalApp.importData(JSON.parse(code)); } catch(e) { alert("Bozuk veri şeması."); }
        }
    }

    function initApp() {
        const dbName = "MapStore_v92";
        let db, savedMarkers = [], customIcon = null;
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("config");
            db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { 
                savedMarkers = ev.target.result || []; 
                // Sıralama (order) değerine göre listeyi diz
                savedMarkers.sort((a, b) => (a.order || 0) - (b.order || 0));
                // Eksik order varsa tamamla
                savedMarkers.forEach((m, i) => m.order = i);
                render(); 
            };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            if (!mapLayer || !document.getElementById('addMode').checked) return;
            
            const userText = document.getElementById('markerTextInput').value.trim();
            const textToSave = userText !== "" ? userText : ""; 

            const markerData = { 
                id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, 
                size: parseInt(document.getElementById('sizeSlider').value), 
                type: document.getElementById('typeSelect').value,
                text: textToSave, 
                img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null,
                order: savedMarkers.length // En sona ekle
            };
            
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            document.getElementById('markerTextInput').value = "";
            render();
        });

        function render() {
            markerLayer.clearLayers();
            const listContainer = document.getElementById('checklist-items');
            listContainer.innerHTML = ''; 

            const isEditable = document.getElementById('editMode').checked;
            
            savedMarkers.forEach((d, index) => {
                
                // --- SÜRÜKLENEBİLİR LİSTE ELEMANI ---
                const listItem = document.createElement('div');
                listItem.className = 'gta-list-item';
                listItem.draggable = true; // Sürükle-Bırak Aktif
                
                let dotColor = d.type === 'red' ? 'var(--danger-color)' : (d.type === 'green' ? 'var(--primary-color)' : (d.type === 'black' ? '#fff' : 'var(--info-color)'));
                listItem.style.borderLeftColor = dotColor;

                const displayName = d.text !== "" ? d.text : `UNKNOWN DATA [${index+1}]`;
                const coordsText = `X: ${d.lng.toFixed(1)}  |  Y: ${d.lat.toFixed(1)}`;

                listItem.innerHTML = `
                    <div class="drag-icon">⋮⋮</div>
                    <div class="item-content-wrapper">
                        <div class="item-row-top">
                            <span class="item-title">${displayName}</span>
                            <div class="item-type-dot" style="background:${dotColor}; box-shadow: 0 0 8px ${dotColor}"></div>
                        </div>
                        <div class="item-coords">${coordsText}</div>
                    </div>
                `;
                
                // Tıklayınca Git
                listItem.querySelector('.item-content-wrapper').onclick = () => { 
                    map.flyTo([d.lat, d.lng], 1, { animate: true, duration: 1.5 }); 
                };

                // --- SÜRÜKLE BIRAK OLAYLARI (DRAG & DROP) ---
                listItem.addEventListener('dragstart', (e) => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', index);
                    setTimeout(() => listItem.classList.add('dragging'), 0);
                });
                
                listItem.addEventListener('dragend', () => {
                    listItem.classList.remove('dragging');
                });
                
                listItem.addEventListener('dragover', (e) => {
                    e.preventDefault(); 
                    e.dataTransfer.dropEffect = 'move';
                });

                listItem.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const draggedIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
                    if (draggedIdx === index || isNaN(draggedIdx)) return;

                    // Dizideki yerlerini değiştir
                    const movedItem = savedMarkers.splice(draggedIdx, 1)[0];
                    savedMarkers.splice(index, 0, movedItem);

                    // Sıralama (order) verilerini güncelle ve veritabanına kaydet
                    const tx = db.transaction("markers", "readwrite");
                    savedMarkers.forEach((m, i) => {
                        m.order = i;
                        tx.objectStore("markers").put(m);
                    });
                    
                    render(); // Arayüzü yenile
                });

                listContainer.appendChild(listItem);


                // --- HARİTA ÜZERİNDEKİ İŞARETÇİ ---
                let mClass = d.type === 'red' ? 'fill-red' : (d.type === 'green' ? 'fill-green' : (d.type === 'black' ? 'hollow-black' : ''));
                const icon = L.divIcon({ 
                    className: `pixel-marker`, 
                    iconSize: [d.size, d.size], 
                    iconAnchor: [d.size/2, d.size/2],
                    html: `
                        <div class="icon-box ${mClass}" style="${d.img ? 'background-image:url('+d.img+')' : ''}">
                            ${d.text ? `<div class="marker-label">${d.text}</div>` : ''}
                        </div>`
                });
                const m = L.marker([d.lat, d.lng], { icon: icon, draggable: isEditable }).addTo(markerLayer);
                
                if(isEditable) {
                    m.on('dragend', ev => {
                        const found = savedMarkers.find(x => x.id === d.id);
                        found.lat = ev.target.getLatLng().lat; found.lng = ev.target.getLatLng().lng;
                        db.transaction("markers", "readwrite").objectStore("markers").put(found);
                        render(); 
                    });
                    m.on('contextmenu', () => {
                        db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                        savedMarkers = savedMarkers.filter(x => x.id !== d.id); 
                        render();
                    });
                }
            });
        }
        
        globalApp = { 
            render, getData: () => savedMarkers,
            importData: (data) => {
                const tx = db.transaction("markers", "readwrite");
                data.forEach(item => tx.objectStore("markers").put(item));
                tx.oncomplete = () => { location.reload(); };
            },
            clearMarkers: () => { db.transaction("markers", "readwrite").objectStore("markers").clear(); savedMarkers = []; render(); }
        };
    }
    document.getElementById('passInput').onkeypress = e => { if(e.key==='Enter') checkLogin() };
</script>
</body>
</html>
