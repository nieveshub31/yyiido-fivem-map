<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP - Satellite Map System v2.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff; /* GTA stili için beyaz ana renk */
            --accent-color: #00ff00;
            --bg-dark: #000000;
            --panel-bg: rgba(0, 0, 0, 0.85);
            --border-color: rgba(255, 255, 255, 0.2);
            --font-main: 'Inter', sans-serif;
            --font-tech: 'JetBrains Mono', monospace;
        }

        body, html, #map { height: 100vh; width: 100vw; margin: 0; padding: 0; background: var(--bg-dark); overflow: hidden; cursor: crosshair !important; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        /* GTA V VIGNETTE EFEKTİ */
        #map::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.7); pointer-events: none; z-index: 1000;
        }

        /* GİRİŞ EKRANI */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-box { text-align: center; border-top: 4px solid var(--accent-color); padding: 40px; background: #0a0a0a; }
        .login-box h2 { color: #fff; letter-spacing: 10px; font-family: var(--font-tech); margin-bottom: 20px; }
        .login-box input { background: #111; border: 1px solid #333; color: #fff; padding: 15px; width: 250px; text-align: center; margin-bottom: 10px; outline: none; }
        .login-box button { background: #fff; border: none; padding: 15px 30px; font-weight: 900; cursor: pointer; width: 100%; }

        /* ÜST MENU BAR */
        .gta-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--border-color);
            z-index: 1001; display: flex; align-items: center; padding: 0 40px;
            font-family: var(--font-tech); letter-spacing: 2px;
        }
        .header-item { color: #888; font-weight: 800; margin-right: 30px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .header-item.active { color: #fff; border-bottom: 3px solid #fff; padding-bottom: 5px; }
        .header-item:hover { color: #fff; }

        /* SAĞ ALT LOKASYON KARTI (GTA STYLE) */
        .location-info {
            position: fixed; bottom: 40px; right: 40px; z-index: 1001;
            background: var(--panel-bg); color: #fff; padding: 20px;
            border-left: 5px solid var(--accent-color); width: 280px;
            font-family: var(--font-tech); box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .loc-title { font-size: 18px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .loc-sub { font-size: 12px; color: var(--accent-color); margin-bottom: 10px; }
        .loc-stats { font-size: 11px; color: #aaa; border-top: 1px solid #333; pt: 10px; display: flex; justify-content: space-between; }

        /* SOL AYARLAR PANELİ */
        #controls {
            position: fixed; top: 80px; left: 40px; z-index: 1001;
            background: var(--panel-bg); width: 300px; padding: 20px;
            border: 1px solid var(--border-color); display: none;
        }
        #controls.active { display: block; }

        /* SAĞ NAVİGASYON LİSTESİ */
        #right-nav {
            position: fixed; top: 80px; right: 40px; z-index: 1001;
            width: 250px; background: var(--panel-bg); border: 1px solid var(--border-color);
        }
        .nav-item { 
            padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; font-weight: 800; font-size: 13px; text-transform: uppercase;
            color: #ccc; transition: 0.2s;
        }
        .nav-item:hover { background: #fff; color: #000; padding-left: 30px; }

        /* PULSE EFEKTİ */
        @keyframes gta-blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .pulse-active { animation: gta-blink 0.4s ease-in-out 3; border: 4px solid #fff !important; }

        .pixel-marker .icon-box { border-radius: 2px; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .marker-label { background: #fff !important; color: #000 !important; font-weight: 900 !important; padding: 2px 8px !important; top: -30px !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="login-overlay">
    <div class="login-box">
        <h2>SATELLITE ACCESS</h2>
        <input type="password" id="passInput" placeholder="ENTER ENCRYPTION KEY">
        <button onclick="checkLogin()">INITIALIZE</button>
    </div>
</div>

<div id="main-content" style="display:none">
    <div class="gta-header">
        <div class="header-item active" onclick="togglePanel()">HARİTA AYARLARI</div>
        <div class="header-item" onclick="toggleRightNav()">LOKASYONLAR</div>
        <div class="header-item" onclick="logout()">SİSTEMDEN ÇIK</div>
    </div>

    <div id="controls">
        <h3 style="font-family:var(--font-tech); font-size:14px; color:var(--accent-color)">NAVİGASYON VERİLERİ</h3>
        <input type="file" id="mainMapInput" style="margin-bottom:15px; font-size:10px">
        <input type="text" id="markerTextInput" placeholder="LOKASYON ADI..." style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:10px">
        <select id="typeSelect" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333">
            <option value="green">GÜVENLİ BÖLGE</option>
            <option value="red">KRİTİK ALAN</option>
            <option value="black">BİLİNMEYEN</option>
        </select>
        <button onclick="exportToCode()" style="width:100%; margin-top:20px; padding:10px; background:var(--accent-color); border:none; font-weight:800">VERİYİ DIŞA AKTAR</button>
    </div>

    <div id="right-nav">
        <div style="background:rgba(255,255,255,0.1); padding:10px; font-size:10px; font-weight:800; color:#aaa">KAYITLI NOKTALAR</div>
        <ul id="nav-list" style="list-style:none; padding:0; margin:0"></ul>
    </div>

    <div class="location-info">
        <div class="loc-sub">Mevcut Koordinatlar</div>
        <div class="loc-title" id="loc-display">Antalya, TR</div>
        <div class="loc-stats">
            <span id="lat-display">LAT: 0.00</span>
            <span id="lng-display">LNG: 0.00</span>
        </div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _p = "knglrpsikersakatbırakır";
    let globalApp = null;

    function checkLogin() {
        if (document.getElementById('passInput').value === _p) {
            sessionStorage.setItem('map_auth', 'true');
            showMainContent();
        } else { alert("ACCESS DENIED"); }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    window.onload = () => { if (sessionStorage.getItem('map_auth') === 'true') showMainContent(); };
    function logout() { sessionStorage.clear(); location.reload(); }
    function togglePanel() { document.getElementById('controls').classList.toggle('active'); }
    function toggleRightNav() { document.getElementById('right-nav').style.display = 
        document.getElementById('right-nav').style.display === 'none' ? 'block' : 'none'; }

    function initApp() {
        const dbName = "GtaMap_v2";
        let db, savedMarkers = [], markerRefs = {};
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 2, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("config");
            db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { savedMarkers = ev.target.result || []; render(); };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
            };
            img.src = url;
        }

        map.on('mousemove', e => {
            document.getElementById('lat-display').innerText = `LAT: ${e.latlng.lat.toFixed(2)}`;
            document.getElementById('lng-display').innerText = `LNG: ${e.latlng.lng.toFixed(2)}`;
        });

        map.on('click', e => {
            if (!mapLayer) return;
            const text = document.getElementById('markerTextInput').value.trim() || "BİLİNMEYEN NOKTA";
            const markerData = { id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, type: document.getElementById('typeSelect').value, text: text };
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        window.flyToMarker = function(id) {
            const data = savedMarkers.find(x => x.id === id);
            if(data) {
                map.flyTo([data.lat, data.lng], 1, { duration: 1.5 });
                document.getElementById('loc-display').innerText = data.text;
                setTimeout(() => {
                    const m = markerRefs[id];
                    if(m) {
                        const el = m.getElement().querySelector('.icon-box');
                        el.classList.add('pulse-active');
                        setTimeout(() => el.classList.remove('pulse-active'), 2000);
                    }
                }, 1600);
            }
        };

        function render() {
            markerLayer.clearLayers();
            const navList = document.getElementById('nav-list');
            navList.innerHTML = "";
            savedMarkers.forEach(d => {
                const li = document.createElement('li');
                li.className = 'nav-item';
                li.innerText = d.text;
                li.onclick = () => flyToMarker(d.id);
                navList.appendChild(li);

                const icon = L.divIcon({ 
                    className: 'pixel-marker', 
                    iconSize: [30, 30], 
                    html: `<div class="icon-box" style="background:${d.type}; width:100%; height:100%;">
                            <div class="marker-label">${d.text}</div>
                           </div>`
                });
                const m = L.marker([d.lat, d.lng], { icon: icon }).addTo(markerLayer);
                markerRefs[d.id] = m;

                m.on('contextmenu', () => {
                    db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                    savedMarkers = savedMarkers.filter(x => x.id !== d.id); render();
                });
            });
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    }
    
    function exportToCode() {
        const data = JSON.stringify(savedMarkers);
        navigator.clipboard.writeText(data).then(() => alert("VERİLER KOPYALANDI!"));
    }
</script>
</body>
</html>
