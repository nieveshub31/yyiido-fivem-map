<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Map System v1.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-color: #00ff00;
            --danger-color: #ff4444;
            --bg-dark: #080c10;
            --panel-bg: rgba(13, 17, 23, 0.96);
            --border-color: #21262d;
            --input-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }
        
        /* Tam Ekran Crosshair */
        body, html, #map, .leaflet-container, * { cursor: crosshair !important; }
        
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: var(--text-main); overflow: hidden; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }

        /* Modern Giriş Ekranı */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #111b27 0%, #080c10 100%); 
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: rgba(22, 27, 34, 0.8); 
            padding: 50px 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(48, 54, 61, 0.5); 
            text-align: center; width: 380px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            backdrop-filter: blur(20px);
        }
        .login-box h2 { 
            color: #fff; letter-spacing: 4px; margin-bottom: 30px; 
            font-size: 22px; font-weight: 900; text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .login-box input[type="password"] { 
            padding: 18px; width: 100%; border-radius: 12px; 
            border: 1px solid #30363d; background: #0d1117; 
            color: white; margin-bottom: 15px; outline: none; 
            transition: 0.3s; cursor: text !important;
            text-align: center; letter-spacing: 2px;
        }
        .login-box input[type="password"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        
        .remember-me {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 25px; color: var(--text-muted);
            font-size: 13px; cursor: pointer !important;
        }
        .remember-me input { accent-color: var(--primary-color); cursor: pointer !important; }

        .login-box button { 
            width: 100%; padding: 18px; background: var(--primary-color); 
            border: none; font-weight: 900; border-radius: 12px; 
            color: #000; transition: 0.3s; text-transform: uppercase; 
            letter-spacing: 2px; box-shadow: 0 4px 15px rgba(0, 255, 0, 0.3);
        }
        .login-box button:hover { 
            background: #00ff00; transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0, 255, 0, 0.4);
        }

        /* Ana İçerik */
        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); z-index: 1; }

        /* KNGLRP Logo */
        #main-logo {
            position: fixed; top: 15px; left: 15px; z-index: 1001;
            font-weight: 900; font-size: 15px; letter-spacing: 3px;
            color: #fff; background: var(--panel-bg); padding: 10px 18px;
            border-radius: 8px; border: 1px solid #30363d;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #main-logo:hover { border-color: var(--primary-color); color: var(--primary-color); box-shadow: 0 0 10px rgba(0,255,0,0.5); }

        /* Sol Panel */
        #controls {
            position: fixed; top: 70px; left: 15px; z-index: 1000;
            background: var(--panel-bg); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border-color); width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            max-height: 85vh; overflow-y: auto; overflow-x: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #controls.collapsed { transform: translateX(-300px); opacity: 0; pointer-events: none; }

        .panel-header { font-size: 12px; font-weight: 800; color: var(--primary-color); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .section { margin-bottom: 18px; }
        .section-title { font-size: 9px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .input-group { background: var(--input-bg); border-radius: 8px; padding: 10px; border: 1px solid #21262d; margin-bottom: 8px; }
        
        input[type="file"], select { width: 100%; background: #0d1117; color: var(--text-main); border: 1px solid #30363d; border-radius: 6px; padding: 7px; outline: none; font-size: 11px; }
        
        .switch-group { display: flex; align-items: center; justify-content: space-between; background: var(--input-bg); padding: 10px; border-radius: 8px; border: 1px solid #21262d; margin-bottom: 6px; }
        .switch { position: relative; display: inline-block; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer !important; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: #8b949e; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(18px); background-color: #000; }

        input[type="range"] { width: 100%; accent-color: var(--primary-color); margin-top: 8px; }

        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; margin-top: 8px; text-transform: uppercase; font-size: 10px; }
        .btn-clear { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid rgba(244, 67, 54, 0.4); }
        .btn-clear:hover { background: #f44336; color: #fff; }

        /* Marker Stilleri */
        .pixel-marker { border-radius: 50%; display: flex; align-items: center; justify-content: center; background: transparent !important; }
        .pixel-marker div { width: 100%; height: 100%; border-radius: 50%; background-size: cover !important; }
        
        .fill-red { border: 3px solid var(--danger-color); background-color: rgba(255, 68, 68, 0.35) !important; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .fill-green { border: 3px solid var(--primary-color); background-color: rgba(0, 255, 0, 0.35) !important; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .hollow-black { border: 3px solid #000000; background-color: transparent !important; box-shadow: 0 0 5px rgba(255,255,255,0.2); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="login-overlay">
    <div class="login-box">
        <h2>yyiido nieves - Map System</h2>
        <input type="password" id="passInput" placeholder="••••••••••••••">
        <label class="remember-me">
            <input type="checkbox" id="rememberCheck"> Beni Hatırla
        </label>
        <button onclick="checkLogin()">KİLİDİ AÇ</button>
        <p id="error-msg" style="color:var(--danger-color); font-size:11px; margin-top:15px; display:none; font-weight:bold; letter-spacing: 1px;">Erişim Reddedildi!</p>
    </div>
</div>

<div id="main-content">
    <div id="main-logo" onclick="togglePanel()">KNGLRP</div>

    <div id="controls">
        <div class="panel-header">KONTROL PANELİ</div>
        
        <div class="section">
            <span class="section-title">HARİTA KATMANI</span>
            <div class="input-group"><input type="file" id="mainMapInput" accept="image/*"></div>
        </div>

        <div class="section">
            <span class="section-title">İŞARETÇİ AYARLARI</span>
            <div class="input-group">
                <input type="file" id="markerImgInput" accept="image/*" style="margin-bottom:10px">
                <select id="typeSelect">
                    <option value="green">🟢 Yeşil (Şeffaf Dolgu)</option>
                    <option value="red">🔴 Kırmızı (Şeffaf Dolgu)</option>
                    <option value="black">⚫ Siyah (İçi Boş)</option>
                    <option value="custom_img">🖼️ Özel İkon</option>
                </select>
                <div style="margin-top: 10px;">
                    <span style="font-size:9px; color:var(--text-muted); text-transform:uppercase;">Boyut</span>
                    <input type="range" id="sizeSlider" min="15" max="150" value="45">
                </div>
            </div>
        </div>

        <div class="section">
            <span class="section-title">MOD KONTROLLERİ</span>
            <div class="switch-group">
                <span style="font-size:11px;">Düzenleme</span>
                <label class="switch"><input type="checkbox" id="editMode" checked onchange="refreshMap()"><span class="slider"></span></label>
            </div>
            <div class="switch-group">
                <span style="font-size:11px; color:var(--primary-color); font-weight:bold;">EKLEME</span>
                <label class="switch"><input type="checkbox" id="addMode" checked><span class="slider"></span></label>
            </div>
        </div>

        <div class="section">
            <button class="btn-action btn-clear" onclick="confirmClear()">TÜMÜNÜ SİL</button>
            <button class="btn-action" style="background:#21262d; color:#8b949e; border:1px solid #30363d; margin-top:10px;" onclick="logout()">OTURUMU KAPAT</button>
        </div>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Şifre: knglrpsikersakatbırakır
    const _p = "knglrpsikersakatbırakır";

    function checkLogin() {
        if (document.getElementById('passInput').value === _p) {
            if (document.getElementById('rememberCheck').checked) {
                localStorage.setItem('map_auth_persistent', 'true');
            }
            sessionStorage.setItem('map_auth', 'true');
            showMainContent();
        } else { 
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('passInput').value = "";
        }
    }

    function logout() {
        localStorage.removeItem('map_auth_persistent');
        sessionStorage.removeItem('map_auth');
        location.reload();
    }

    window.onload = () => {
        if (localStorage.getItem('map_auth_persistent') === 'true' || sessionStorage.getItem('map_auth') === 'true') {
            showMainContent();
        }
    };

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }

    let globalApp = null; 
    function refreshMap() { if(globalApp) globalApp.render(); }
    function confirmClear() { if(confirm("Tüm veriler silinecek aşkım?")) globalApp.clearMarkers(); }

    function initApp() {
        const dbName = "MapStore_v86";
        let db, savedMarkers = [], customIcon = null;
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("config");
            db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { savedMarkers = ev.target.result || []; render(); };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            if (!mapLayer || !document.getElementById('addMode').checked) return;
            const markerData = { 
                id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, 
                size: parseInt(document.getElementById('sizeSlider').value), 
                type: document.getElementById('typeSelect').value,
                img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null
            };
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        function render() {
            markerLayer.clearLayers();
            const isEditable = document.getElementById('editMode').checked;
            savedMarkers.forEach(d => {
                let mClass = d.type === 'red' ? 'fill-red' : (d.type === 'green' ? 'fill-green' : (d.type === 'black' ? 'hollow-black' : ''));
                const style = d.img ? `background-image:url(${d.img});` : '';
                const icon = L.divIcon({ 
                    className: `pixel-marker ${mClass}`, 
                    iconSize: [d.size, d.size], 
                    iconAnchor: [d.size/2, d.size/2],
                    html: `<div style="${style}"></div>`
                });
                const m = L.marker([d.lat, d.lng], { icon: icon, draggable: isEditable }).addTo(markerLayer);
                if(isEditable) {
                    m.on('dragend', ev => {
                        const found = savedMarkers.find(x => x.id === d.id);
                        found.lat = ev.target.getLatLng().lat; found.lng = ev.target.getLatLng().lng;
                        db.transaction("markers", "readwrite").objectStore("markers").put(found);
                    });
                    m.on('contextmenu', () => {
                        db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                        savedMarkers = savedMarkers.filter(x => x.id !== d.id); 
                        render();
                    });
                }
            });
        }

        globalApp = { render, clearMarkers: () => {
            db.transaction("markers", "readwrite").objectStore("markers").clear();
            savedMarkers = []; render();
        }};
    }
    document.getElementById('passInput').addEventListener('keypress', e => { if(e.key==='Enter') checkLogin() });
</script>
</body>
</html>
